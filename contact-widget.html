<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Связаться со мной</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      background: transparent !important;
    }

    .contact-widget,
    .contact-widget * { box-sizing: border-box; }

    .contact-widget {
      position: relative;
      width: 100%;
      min-height: 92px;
      padding: 2px 0;
      font-family: "Montserrat", Arial, sans-serif;
      transition: min-height .28s ease;
    }

    .contact-widget.is-open { min-height: 184px; }

    .contact-open {
      position: relative;
      display: block;
      width: min(100%, 620px);
      height: clamp(62px, 12.9vw, 80px);
      min-height: 0;
      margin: 0 auto;
      overflow: hidden;
      padding: 0;
      border: 1px solid rgba(170, 232, 255, .82);
      border-radius: 999px;
      color: #05070a;
      background:
        linear-gradient(180deg, rgba(255,255,255,.20), transparent 44%),
        linear-gradient(105deg, #3cc8f2 0%, #388be8 52%, #4b70e5 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .28),
        inset 0 0 20px rgba(190, 239, 255, .14),
        0 3px 10px rgba(0, 0, 0, .18);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
      animation: contact-soft-pulse 2.35s ease-in-out infinite;
    }

    .contact-open__fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      font-family: Arial, sans-serif;
      font-size: clamp(14px, 4.5vw, 22px);
      line-height: 1;
      letter-spacing: .02em;
      text-align: center;
      text-transform: uppercase;
    }

    .contact-open__image {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border: 0;
      filter: brightness(0) saturate(100%);
    }

    .contact-open::after {
      content: "";
      position: absolute;
      top: -70%;
      left: -35%;
      width: 26%;
      height: 240%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.42), transparent);
      transform: rotate(18deg);
      transition: left .65s ease;
    }

    .contact-open:hover::after { left: 112%; }
    .contact-open:hover {
      filter: brightness(1.08) saturate(1.06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .34),
        inset 0 0 24px rgba(205, 244, 255, .2),
        0 4px 12px rgba(0, 0, 0, .2);
    }
    .contact-open:active { transform: scale(.975); }
    .contact-open:focus-visible { outline: 2px solid #fff; outline-offset: 4px; }
    .contact-widget.is-open .contact-open,
    .contact-open:hover,
    .contact-open:focus-visible,
    .contact-open:active { animation-play-state: paused; }

    @keyframes contact-soft-pulse {
      0%, 100% {
        filter: brightness(.96) saturate(1);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, .28),
          inset 0 0 20px rgba(190, 239, 255, .14),
          0 3px 10px rgba(0, 0, 0, .18);
      }
      50% {
        filter: brightness(1.28) saturate(1.14);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, .48),
          inset 0 0 30px rgba(205, 244, 255, .34),
          0 0 20px rgba(92, 198, 249, .42);
      }
    }

    .contact-modal {
      position: absolute;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 14px;
      visibility: hidden;
      opacity: 0;
      background: rgba(0, 2, 7, .54);
      backdrop-filter: blur(2px);
      transition: opacity .25s ease, visibility .25s ease;
    }

    .contact-modal[hidden] { display: none !important; }

    .contact-modal.is-open {
      visibility: visible;
      opacity: 1;
    }

    .contact-dialog {
      position: relative;
      width: min(100%, 420px);
      padding: 17px 0 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      transform: translateY(18px) scale(.97);
      transition: transform .28s cubic-bezier(.2,.8,.2,1);
    }

    .contact-modal.is-open .contact-dialog { transform: translateY(0) scale(1); }

    .contact-close {
      position: absolute;
      z-index: 5;
      top: -2px;
      right: 2px;
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 50%;
      color: #fff;
      background: #020306;
      cursor: pointer;
    }

    .contact-close svg { width: 14px; height: 14px; }

    .contact-actions { display: grid; gap: 8px; }

    .contact-action {
      position: relative;
      display: grid;
      grid-template-columns: 52px 1fr 27px;
      min-height: 64px;
      align-items: center;
      gap: 12px;
      overflow: hidden;
      padding: 6px 13px;
      border: 2px solid rgba(255,255,255,.92);
      border-radius: 999px;
      color: #fff;
      background: #020306;
      text-decoration: none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .contact-action::before {
      content: "";
      position: absolute;
      inset: 1% 5%;
      pointer-events: none;
      border-radius: 999px;
      background: linear-gradient(105deg,transparent 30%,rgba(103,200,255,.04) 40%,rgba(200,241,255,.38) 50%,rgba(103,200,255,.05) 60%,transparent 70%);
      background-position: 140% 0;
      background-size: 260% 100%;
      opacity: 0;
      mix-blend-mode: screen;
    }

    .contact-action:hover {
      opacity: .88;
    }

    .contact-action:active { transform: scale(.975); }
    .contact-action:hover::before,
    .contact-action:focus-visible::before,
    .contact-action:active::before { animation: contact-wave .78s ease-out 1; }

    @keyframes contact-wave {
      0% { background-position:140% 0; opacity:0; }
      12%,82% { opacity:1; }
      100% { background-position:-140% 0; opacity:0; }
    }

    .contact-action__icon {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border-radius: 50%;
      color: #72cefa;
      background: transparent;
    }

    .contact-action__icon svg { width: 32px; height: 32px; }
    .contact-action__copy { min-width: 0; }
    .contact-action__name { display: block; font-family:"Montserrat",Arial,sans-serif; font-size:clamp(12px,3.5vw,16px); font-weight:600; line-height:1.15; text-align:center; text-transform:uppercase; }
    .contact-action__value { display: none; }
    .contact-action__arrow { color: #72cefa; font-size: 26px; text-align: center; }

    @media (max-width: 520px) {
      .contact-widget.is-open { min-height: 174px; }
      .contact-modal { align-items: center; padding: 7px 9px; }
      .contact-dialog { width: 100%; padding: 17px 0 0; transform: translateY(24px) scale(.97); }
      .contact-modal.is-open .contact-dialog { transform: translateY(0); }
      .contact-action { grid-template-columns: 46px 1fr 24px; min-height: 62px; padding: 5px 10px; }
      .contact-action__icon { width: 43px; height: 43px; }
      .contact-action__icon svg { width: 30px; height: 30px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .contact-open,
      .contact-open::after,
      .contact-modal,
      .contact-dialog,
      .contact-action { transition: none; }
      .contact-open { animation: none; }
    }
  </style>
</head>
<body>
  <div class="contact-widget">
    <button class="contact-open" id="contactOpen" type="button" aria-haspopup="dialog" aria-controls="contactModal">
      <span class="contact-open__fallback">Связаться со мной</span>
      <img class="contact-open__image" src="contact-button-micra.png?v=20260714-2" alt="Связаться со мной">
    </button>

    <div class="contact-modal" id="contactModal" role="dialog" aria-modal="true" aria-label="Выберите способ связи" hidden>
      <div class="contact-dialog">
        <button class="contact-close" id="contactClose" type="button" aria-label="Закрыть">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
        <div class="contact-actions">
        <a class="contact-action" href="tel:+79673113200">
          <span class="contact-action__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.69 2.8a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.33 1.84.56 2.8.69A2 2 0 0 1 22 16.92z"/></svg>
          </span>
          <span class="contact-action__copy"><span class="contact-action__name">Позвонить</span></span>
          <span class="contact-action__arrow">›</span>
        </a>

        <a class="contact-action" href="https://t.me/Alex_Blond7" target="_blank" rel="noopener noreferrer">
          <span class="contact-action__icon">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.8 3.2 18.6 20c-.24 1.19-.88 1.48-1.78.92l-4.88-3.6-2.35 2.27c-.26.26-.48.48-.98.48l.35-4.97 9.05-8.18c.39-.35-.09-.55-.61-.2L6.22 13.76l-4.81-1.5c-1.05-.33-1.07-1.05.22-1.55L20.45 3.45c.87-.32 1.63.2 1.35-.25Z"/></svg>
          </span>
          <span class="contact-action__copy"><span class="contact-action__name">Написать в Telegram</span></span>
          <span class="contact-action__arrow">›</span>
        </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const openButton = document.getElementById('contactOpen');
      const widget = openButton.closest('.contact-widget');
      const modal = document.getElementById('contactModal');
      const closeButton = document.getElementById('contactClose');
      const image = openButton.querySelector('.contact-open__image');
      const widgetMode = new URLSearchParams(window.location.search).get('mode') === 'dates' ? 'dates' : 'contact';
      if (widgetMode === 'dates') {
        image.src = 'dates-button-micra.png?v=20260714-2';
        image.alt = 'Узнать свободные даты';
      }
      const notifyHeight = height => window.parent.postMessage({ type: 'alex-contact-height', mode: widgetMode, height }, '*');

      const openModal = () => {
        modal.hidden = false;
        widget.classList.add('is-open');
        requestAnimationFrame(() => modal.classList.add('is-open'));
        notifyHeight(184);
      };

      const closeModal = () => {
        modal.classList.remove('is-open');
        widget.classList.remove('is-open');
        window.setTimeout(() => { modal.hidden = true; }, 260);
        openButton.focus();
        notifyHeight(92);
      };

      openButton.addEventListener('click', openModal);
      closeButton.addEventListener('click', closeModal);
      modal.addEventListener('click', event => { if (event.target === modal) closeModal(); });
      document.addEventListener('keydown', event => { if (event.key === 'Escape' && !modal.hidden) closeModal(); });
      notifyHeight(92);
    })();
  </script>
</body>
</html>
