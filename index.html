<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DJ Player</title>
<style>
body {
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: sans-serif;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin: 0;
  padding: 0;
}
.player-controls {
  display: flex;
  gap: 25px;
  align-items: center;
  justify-content: center;
}
.control-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin: 0;
  width: 70px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.05s linear;
  -webkit-tap-highlight-color: transparent;
}
.control-btn:active {
  transform: scale(0.95);
}
.control-btn.small {
  width: 56px;
  height: 56px;
}
.control-svg {
  display: block;
  width: 100%;
  height: 100%;
}
.control-svg path,
.control-svg rect {
  fill: none;
  stroke: #8bc9bd; /* чуть светлее, чтобы визуально линии были тоньше */
  stroke-width: 0.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
#equalizer {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  min-height: 60px;
  margin: 0;
  padding: 0;
}
.eq-bar {
  width: 5px;
  background: linear-gradient(to top, transparent, #78AFA4 10%, #78AFA4 90%, transparent);
  border-radius: 2px;
  transition: height 0.05s linear;
}
</style>
</head>
<body>

<div class="container">
  <audio id="audio" preload="auto" crossorigin="anonymous" playsinline></audio>
  <div class="player-controls">
    <!-- Prev: треугольник влево -->
    <button class="control-btn small" id="prevBtn">
      <svg class="control-svg" viewBox="0 0 24 24">
        <path d="M15 6 L7 12 L15 18 Z" />
      </svg>
    </button>
    <!-- Play/Pause -->
    <button class="control-btn" id="playPauseBtn">
      <svg class="control-svg" id="playIcon" viewBox="0 0 24 24">
        <path d="M9 6 L19 12 L9 18 Z" />
      </svg>
      <svg class="control-svg" id="pauseIcon" viewBox="0 0 24 24" style="display: none;">
        <rect x="8" y="6" width="3" height="12" />
        <rect x="13" y="6" width="3" height="12" />
      </svg>
    </button>
    <!-- Next: треугольник вправо -->
    <button class="control-btn small" id="nextBtn">
      <svg class="control-svg" viewBox="0 0 24 24">
        <path d="M9 6 L17 12 L9 18 Z" />
      </svg>
    </button>
  </div>
  <div id="equalizer"></div>
</div>

<script>
// ==== Настройка треков ====
const tracks = [
  { name: "Track 1", url: "https://raw.githubusercontent.com/AlukardT/dj-player2/refs/heads/main/track.mp3" },
  // { name: "Track 2", url: "https://raw.githubusercontent.com/AlukardT/dj-player2/refs/heads/main/track2.mp3" }
];
let currentTrackIndex = 0;

const audio = document.getElementById('audio');
const playPauseBtn = document.getElementById('playPauseBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const eq = document.getElementById('equalizer');

// ==== Эквалайзер ====
const BAR_COUNT = 40;
let bars = [];
for (let i = 0; i < BAR_COUNT; i++) {
  const bar = document.createElement('div');
  bar.className = 'eq-bar';
  bar.style.height = '4px';
  eq.appendChild(bar);
  bars.push(bar);
}

let audioCtx = null;
let analyser = null;
let source = null;
let animationId = null;

function stopAnimation() {
  if (animationId) cancelAnimationFrame(animationId);
  bars.forEach(bar => bar.style.height = '4px');
}

async function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const data = new Uint8Array(analyser.frequencyBinCount);
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  function animate() {
    if (!analyser) return;
    analyser.getByteFrequencyData(data);
    for (let i = 0; i < BAR_COUNT; i++) {
      let val = data[i];
      let h = 4 + (val / 255) * 50;
      bars[i].style.height = h + 'px';
    }
    animationId = requestAnimationFrame(animate);
  }
  animate();
}

async function loadTrack(index) {
  const wasPlaying = !audio.paused;
  if (wasPlaying) audio.pause();
  audio.src = tracks[index].url;
  audio.load();
  if (source) {
    try { source.disconnect(); } catch(e) {}
    source = null;
  }
  if (wasPlaying) {
    try {
      if (!audioCtx) await initAudioContext();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      await audio.play();
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
    } catch(e) {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
    }
  } else {
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
  }
  stopAnimation();
}

function prevTrack() {
  if (tracks.length === 0) return;
  currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
  loadTrack(currentTrackIndex);
}
function nextTrack() {
  if (tracks.length === 0) return;
  currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
  loadTrack(currentTrackIndex);
}

async function togglePlayPause() {
  try {
    if (!audioCtx) await initAudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    if (audio.paused) {
      if (audio.readyState < 2) {
        audio.load();
        await new Promise(resolve => {
          audio.addEventListener('canplaythrough', resolve, { once: true });
        });
      }
      await audio.play();
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
    } else {
      audio.pause();
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      stopAnimation();
    }
  } catch (e) {
    console.warn("Play/pause error:", e);
    audio.load();
  }
}

audio.addEventListener('ended', () => {
  playIcon.style.display = 'block';
  pauseIcon.style.display = 'none';
  stopAnimation();
});

playPauseBtn.addEventListener('click', togglePlayPause);
prevBtn.addEventListener('click', prevTrack);
nextBtn.addEventListener('click', nextTrack);

loadTrack(currentTrackIndex);
</script>
</body>
</html>
