<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Alex Blond Player</title><script src="./equalizer-v2.js" defer></script>
<style>:root{--violet:#72ddc1!important}.player{background:radial-gradient(circle at 50% 120%,rgba(42,118,116,.14),transparent 58%),linear-gradient(120deg,#04070b,#071015 55%,#030507)!important}.bar{background:linear-gradient(to top,rgba(103,200,255,.08),#63c9f4,rgba(114,221,193,.62))!important}</style>
<style>.player{background:#05080c!important;box-shadow:0 9px 26px rgba(0,0,0,.42)!important}.control{color:#63c9f4!important}.side{width:48px!important;height:48px!important;opacity:1!important}.play{width:58px!important;height:58px!important}.controls{gap:43px!important;margin-bottom:21px!important}.number{display:none!important}.title{color:#8fd9f7!important}.visualizer{opacity:.20!important}@media(max-width:520px){.side{width:42px!important;height:42px!important}.play{width:52px!important;height:52px!important}.controls{gap:31px!important;margin-bottom:18px!important}}</style>
<style>:root{color-scheme:dark;--cyan:#63c9f4;--ice:#b8e9ff;--violet:#9786ff}*{box-sizing:border-box}html,body{margin:0;background:#020306;font-family:Arial,sans-serif}body{padding:7px}.player{position:relative;width:100%;max-width:760px;min-height:142px;margin:auto;overflow:hidden;border:1px solid rgba(103,200,255,.30);border-radius:28px;background:radial-gradient(circle at 50% 120%,rgba(55,55,115,.20),transparent 58%),linear-gradient(120deg,#04070b,#070b12 55%,#030507);box-shadow:0 9px 30px rgba(0,0,0,.48),inset 0 0 35px rgba(103,200,255,.025)}.visualizer{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:3px;padding:0 7px;opacity:.17;pointer-events:none;mask-image:linear-gradient(to right,transparent,#000 8%,#000 92%,transparent)}.bar{flex:1;max-width:9px;min-width:2px;min-height:3px;border-radius:8px;background:linear-gradient(to top,rgba(103,200,255,.08),var(--cyan),rgba(151,134,255,.65));box-shadow:0 0 8px rgba(103,200,255,.18);transition:height .06s linear}.content{position:relative;z-index:2;display:flex;min-height:142px;flex-direction:column;align-items:center;justify-content:center;padding:15px 18px 13px;background:linear-gradient(90deg,rgba(2,3,6,.53),rgba(2,3,6,.20),rgba(2,3,6,.53))}.controls{display:flex;align-items:center;justify-content:center;gap:39px;margin-bottom:13px}.control{display:grid;width:38px;height:38px;place-items:center;padding:0;border:0;background:transparent;cursor:pointer;filter:drop-shadow(0 0 7px rgba(103,200,255,.14));transition:transform .15s,filter .15s}.control:hover{transform:scale(1.08);filter:drop-shadow(0 0 8px currentColor)}.control:active{transform:scale(.92)}.control svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.15;stroke-linecap:round;stroke-linejoin:round}.previous{color:var(--cyan)}.play{width:45px;height:45px;color:var(--ice)}.next{color:var(--violet)}.title{max-width:92%;margin:0;color:#8fd9f7;font-size:15px;font-weight:400;line-height:1.3;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 12px rgba(103,200,255,.16)}.number{margin:6px 0 0;color:rgba(184,233,255,.42);font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}@media(max-width:520px){body{padding:5px}.player,.content{min-height:132px}.player{border-radius:24px}.controls{gap:30px;margin-bottom:11px}.control{width:34px;height:34px}.play{width:41px;height:41px}.title{font-size:13px}.visualizer{gap:2px}}</style></head>
<body><main class="player"><audio id="audio" preload="metadata" playsinline></audio><div class="visualizer" id="visualizer" aria-hidden="true"></div><div class="content"><div class="controls"><button class="control previous" id="previous" type="button" aria-label="Предыдущий трек"><svg viewBox="0 0 24 24"><path d="M16 5.5 7.5 12l8.5 6.5v-13Z"/></svg></button><button class="control play" id="play" type="button" aria-label="Воспроизвести"><svg id="icon" viewBox="0 0 24 24"><path d="m8 4.8 10.8 7.2L8 19.2V4.8Z"/></svg></button><button class="control next" id="next" type="button" aria-label="Следующий трек"><svg viewBox="0 0 24 24"><path d="m8 5.5 8.5 6.5L8 18.5v-13Z"/></svg></button></div><p class="title" id="title"></p><p class="number" id="number"></p></div></main>
<script>const tracks=[{title:'DJ Alex Blond — Promo Mix',url:'./audio/mix-1.mp3'},{title:'Alex Blond — Warm Up Podcast #026',url:'./audio/mix-2.mp3'},{title:'ALEX BLOND — WELCOME Live Mix vol. 1',url:'./audio/mix-3.mp3'},{title:'ALEX BLOND — 2000 MINI MIX',url:'./audio/mix-4.mp3'},{title:'Alex Blond — Dance City Podcast #062 (Progressive)',url:'./audio/mix-5.mp3'}];const audio=document.getElementById('audio'),play=document.getElementById('play'),icon=document.getElementById('icon'),previous=document.getElementById('previous'),next=document.getElementById('next'),title=document.getElementById('title'),number=document.getElementById('number'),visualizer=document.getElementById('visualizer');let index=0,ctx,analyser,source;const bars=[];for(let i=0;i<54;i++){const b=document.createElement('i');b.className='bar';b.style.height='3px';visualizer.appendChild(b);bars.push(b)}const state=p=>{play.setAttribute('aria-label',p?'Пауза':'Воспроизвести');icon.innerHTML=p?'<path d="M8 5.5v13M16 5.5v13"></path>':'<path d="m8 4.8 10.8 7.2L8 19.2V4.8Z"></path>'};const reset=()=>bars.forEach(b=>b.style.height='3px');function load(i,auto=false){index=(i+tracks.length)%tracks.length;audio.src=tracks[index].url;audio.load();title.textContent=tracks[index].title;number.textContent=`${index+1} / ${tracks.length}`;state(false);reset();if(auto)audio.addEventListener('canplay',start,{once:true})}async function setup(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();analyser=ctx.createAnalyser();analyser.fftSize=256;source=ctx.createMediaElementSource(audio);source.connect(analyser);analyser.connect(ctx.destination);animate()}if(ctx.state==='suspended')await ctx.resume()}function animate(){const data=new Uint8Array(analyser.frequencyBinCount);const draw=()=>{if(!audio.paused){analyser.getByteFrequencyData(data);bars.forEach((b,i)=>{const a=Math.floor(i*data.length/bars.length),z=Math.floor((i+1)*data.length/bars.length);let n=0;for(let j=a;j<z;j++)n+=data[j];const avg=n/Math.max(1,z-a),edge=.58+.42*Math.sin(Math.PI*i/(bars.length-1));b.style.height=`${Math.max(3,3+avg/255*122*edge)}px`})}requestAnimationFrame(draw)};draw()}async function start(){try{await setup();await audio.play();state(true)}catch(e){state(false)}}play.onclick=()=>audio.paused?start():(audio.pause(),state(false),reset());previous.onclick=()=>load(index-1,!audio.paused);next.onclick=()=>load(index+1,!audio.paused);audio.onended=()=>load(index+1,true);audio.onplay=()=>state(true);audio.onpause=()=>{if(!audio.ended)state(false)};load(0);</script></body></html>
