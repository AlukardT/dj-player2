<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DJ Player</title>
<style>
body {
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: sans-serif;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.eq-bar {
  width: 5px;
  background: linear-gradient(to top, transparent, #78AFA4, transparent);
  border-radius: 2px;
  transition: height 0.05s linear;
}
#equalizer {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  min-height: 60px;
}
button {
  background: none;
  border: none;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
  <audio id="audio" src="https://raw.githubusercontent.com/ТВОЙ_НИК/dj-player/main/Alex-blond-Stop-Night-final-mix.mp3" crossorigin="anonymous"></audio>
  <button id="btn">
    <img id="img" src="https://i.postimg.cc/kgPF0d89/play.png" width="70">
  </button>
  <div id="equalizer"></div>
</div>

<script>
const audio = document.getElementById('audio');
const btn = document.getElementById('btn');
const img = document.getElementById('img');
const eq = document.getElementById('equalizer');
const playSrc = "https://i.postimg.cc/kgPF0d89/play.png";
const pauseSrc = "https://i.postimg.cc/fWFvvdT1/pause.png";

const BAR_COUNT = 40;
let bars = [];

// создаём полоски эквалайзера
for (let i = 0; i < BAR_COUNT; i++) {
  const bar = document.createElement('div');
  bar.className = 'eq-bar';
  bar.style.height = '4px';
  eq.appendChild(bar);
  bars.push(bar);
}

let audioCtx = null;
let analyser = null;
let source = null;
let dataArray = null;

// событие на кнопку
btn.onclick = function() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    function animate() {
      requestAnimationFrame(animate);
      analyser.getByteFrequencyData(dataArray);
      for (let i = 0; i < BAR_COUNT; i++) {
        bars[i].style.height = (4 + (dataArray[i]/255)*50) + "px";
      }
    }
    animate();
  }

  // play/pause
  if (audio.paused) {
    audio.play();
    audioCtx.resume();
    img.src = pauseSrc;
  } else {
    audio.pause();
    img.src = playSrc;
  }
}

audio.onended = () => { img.src = playSrc; };
</script>

</body>
</html>
