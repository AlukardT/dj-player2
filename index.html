<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DJ Player</title>
<style>
/* Базовый фон */
body {
  background: #0f0f0f !important;
  display: flex !important;
  justify-content: center !important;
  align-items: center !important;
  height: 100vh !important;
  margin: 0 !important;
  font-family: sans-serif !important;
}

/* Контейнер */
.container {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  gap: 0 !important; /* полностью убираем отступы между элементами */
  margin: 0 !important;
  padding: 0 !important;
}

/* Кнопка play/pause */
button {
  background: none !important;
  border: none !important;
  cursor: pointer !important;
  padding: 0 !important;
  margin: 0 !important;
}

/* Эквалайзер */
#equalizer {
  display: flex !important;
  align-items: flex-end !important;
  gap: 3px !important;
  min-height: 60px !important;
  margin: 0 !important;
  padding: 0 !important;
}

.eq-bar {
  width: 5px !important;
  background: linear-gradient(to top, transparent, #78AFA4 10%, #78AFA4 90%, transparent) !important;
  border-radius: 2px !important;
  transition: height 0.05s linear !important;
}

/* Принудительно убираем любые надписи Taplink в блоке */
.container p, .container * {
  margin: 0 !important;
  padding: 0 !important;
  display: none !important;
}
</style>
</head>
<body>
<div class="container">
  <audio id="audio" src="https://raw.githubusercontent.com/AlukardT/dj-player2/refs/heads/main/track.mp3" crossorigin="anonymous" playsinline></audio>
  <button id="btn">
    <img id="img" src="https://i.postimg.cc/kgPF0d89/play.png" width="70">
  </button>
  <div id="equalizer"></div>
</div>

<script>
const audio = document.getElementById('audio');
const btn = document.getElementById('btn');
const img = document.getElementById('img');
const eq = document.getElementById('equalizer');
const playSrc = "https://i.postimg.cc/kgPF0d89/play.png";
const pauseSrc = "https://i.postimg.cc/fWFvvdT1/pause.png";

const BAR_COUNT = 40;
let bars = [];

for (let i = 0; i < BAR_COUNT; i++) {
  const bar = document.createElement('div');
  bar.className = 'eq-bar';
  bar.style.height = '4px';
  eq.appendChild(bar);
  bars.push(bar);
}

let audioCtx = null;
let analyser = null;
let source = null;
let animationId = null;

function stopAnimation() {
  if (animationId) cancelAnimationFrame(animationId);
  bars.forEach(bar => bar.style.height = '4px');
}

btn.addEventListener('click', async () => {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      const data = new Uint8Array(analyser.frequencyBinCount);
      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      
      function animate() {
        analyser.getByteFrequencyData(data);
        for (let i = 0; i < BAR_COUNT; i++) {
          let val = data[i];
          let h = 4 + (val / 255) * 50;
          bars[i].style.height = h + 'px';
        }
        animationId = requestAnimationFrame(animate);
      }
      animate();
    }

    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }

    if (audio.paused) {
      if (audio.readyState < 2) {
        audio.load();
        await new Promise(resolve => {
          audio.addEventListener('canplaythrough', resolve, { once: true });
        });
      }
      await audio.play();
      img.src = pauseSrc;
    } else {
      audio.pause();
      img.src = playSrc;
      stopAnimation();
    }
  } catch (e) {
    console.log("Play failed:", e);
    audio.load();
  }
});

audio.onended = () => {
  img.src = playSrc;
  stopAnimation();
};
</script>
</body>
</html>
