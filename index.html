<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Alex Blond — Миксы</title>
<style>:root{color-scheme:dark;--a:#67c8ff;--bg:#020306;--muted:rgba(255,255,255,.58)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);font-family:Arial,sans-serif}body{display:grid;place-items:center;padding:20px}.player{width:min(100%,560px);padding:28px 28px 24px;border:2px solid rgba(103,200,255,.78);border-radius:24px;background:linear-gradient(145deg,rgba(14,24,35,.96),rgba(3,6,11,.98));box-shadow:0 0 0 1px rgba(103,200,255,.12),0 22px 70px rgba(0,0,0,.62),0 0 30px rgba(103,200,255,.22);overflow:hidden}.kicker{margin:0 0 5px;color:var(--a);font-size:10px;font-weight:700;letter-spacing:.32em;text-align:center;text-transform:uppercase}.heading{margin:0;color:#fff;font-size:15px;font-weight:700;letter-spacing:.18em;text-align:center;text-transform:uppercase}.visualizer{height:72px;display:flex;align-items:flex-end;justify-content:center;gap:3px;margin:19px 0 13px}.bar{width:5px;min-height:4px;border-radius:3px 3px 0 0;background:linear-gradient(to top,rgba(103,200,255,.18),var(--a));box-shadow:0 0 8px rgba(103,200,255,.24);transition:height .06s linear}.controls{display:flex;align-items:center;justify-content:center;gap:27px}.control{display:grid;place-items:center;padding:0;border:0;color:var(--a);background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}.control svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}.side{width:48px;height:48px;opacity:.84}.main{width:82px;height:82px;border:1px solid rgba(255,255,255,.9);border-radius:50%;background:rgba(5,9,15,.62);box-shadow:inset 0 0 0 7px rgba(255,255,255,.035),0 0 0 8px rgba(103,200,255,.08),0 8px 28px rgba(0,0,0,.45);transition:transform .16s,background .16s}.main:hover{transform:scale(1.06);background:rgba(25,112,165,.45)}.main svg{width:36px;height:36px;stroke-width:1.8}.control:active{transform:scale(.94)}.track-title{min-height:44px;display:flex;align-items:center;justify-content:center;margin:19px auto 5px;color:#fff;font-size:15px;font-weight:700;line-height:1.35;text-align:center}.track-number{margin:0 0 18px;color:var(--a);font-size:10px;font-weight:700;letter-spacing:.22em;text-align:center;text-transform:uppercase}.progress{width:100%;height:4px;margin:0;appearance:none;border:0;border-radius:10px;outline:0;background:linear-gradient(to right,var(--a) 0%,var(--a) var(--value,0%),rgba(255,255,255,.16) var(--value,0%),rgba(255,255,255,.16) 100%);cursor:pointer}.progress::-webkit-slider-thumb{width:14px;height:14px;appearance:none;border:2px solid #fff;border-radius:50%;background:var(--a);box-shadow:0 0 10px rgba(103,200,255,.55)}.progress::-moz-range-thumb{width:11px;height:11px;border:2px solid #fff;border-radius:50%;background:var(--a)}.time{display:flex;justify-content:space-between;margin-top:9px;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}@media(max-width:520px){body{padding:13px}.player{padding:23px 18px 20px;border-radius:20px}.visualizer{height:60px;margin-top:16px}.bar{width:4px}.controls{gap:20px}.side{width:42px;height:42px}.main{width:74px;height:74px}.track-title{font-size:14px;margin-top:17px}}</style></head>
<body><main class="player"><p class="kicker">Alex Blond</p><h1 class="heading">Миксы</h1><div class="visualizer" id="visualizer" aria-hidden="true"></div><audio id="audio" preload="metadata" playsinline></audio><div class="controls"><button class="control side" id="previous" type="button" aria-label="Предыдущий трек"><svg viewBox="0 0 24 24"><path d="M15.5 5.5 7.5 12l8 6.5V5.5Z"/><path d="M6 5.5v13"/></svg></button><button class="control main" id="play" type="button" aria-label="Воспроизвести"><svg id="playIcon" viewBox="0 0 24 24"><path d="m9 6 9 6-9 6V6Z"/></svg></button><button class="control side" id="next" type="button" aria-label="Следующий трек"><svg viewBox="0 0 24 24"><path d="m8.5 5.5 8 6.5-8 6.5v-13Z"/><path d="M18 5.5v13"/></svg></button></div><div class="track-title" id="trackTitle"></div><p class="track-number" id="trackNumber"></p><input class="progress" id="progress" type="range" min="0" max="1000" value="0" aria-label="Позиция воспроизведения"><div class="time"><span id="elapsed">0:00</span><span id="duration">0:00</span></div></main>
<script>
const tracks=[{title:'DJ Alex Blond — Promo Mix',url:'./audio/mix-1.mp3'},{title:'Alex Blond — Warm Up Podcast #026',url:'./audio/mix-2.mp3'},{title:'ALEX BLOND — WELCOME Live Mix vol. 1',url:'./audio/mix-3.mp3'},{title:'ALEX BLOND — 2000 MINI MIX',url:'./audio/mix-4.mp3'},{title:'Alex Blond — Dance City Podcast #062 (Progressive)',url:'./audio/mix-5.mp3'}];
const audio=document.getElementById('audio'),play=document.getElementById('play'),icon=document.getElementById('playIcon'),previous=document.getElementById('previous'),next=document.getElementById('next'),title=document.getElementById('trackTitle'),number=document.getElementById('trackNumber'),progress=document.getElementById('progress'),elapsed=document.getElementById('elapsed'),duration=document.getElementById('duration'),visualizer=document.getElementById('visualizer');let index=0,audioContext,analyser,source,isSeeking=false;const bars=[];for(let i=0;i<38;i++){const bar=document.createElement('i');bar.className='bar';bar.style.height='4px';visualizer.appendChild(bar);bars.push(bar)}
const format=s=>{if(!Number.isFinite(s))return'0:00';const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=Math.floor(s%60).toString().padStart(2,'0');return h?`${h}:${m.toString().padStart(2,'0')}:${x}`:`${m}:${x}`};const state=p=>{play.setAttribute('aria-label',p?'Поставить на паузу':'Воспроизвести');icon.innerHTML=p?'<rect x="7" y="6" width="3.5" height="12" rx="1"></rect><rect x="13.5" y="6" width="3.5" height="12" rx="1"></rect>':'<path d="m9 6 9 6-9 6V6Z"></path>'};const reset=()=>bars.forEach(b=>b.style.height='4px');
function load(i,auto=false){index=(i+tracks.length)%tracks.length;audio.src=tracks[index].url;audio.load();title.textContent=tracks[index].title;number.textContent=`Трек ${index+1} / ${tracks.length}`;progress.value=0;progress.style.setProperty('--value','0%');elapsed.textContent=duration.textContent='0:00';state(false);reset();if(auto)audio.addEventListener('canplay',start,{once:true})}
async function setup(){if(!audioContext){audioContext=new(window.AudioContext||window.webkitAudioContext)();analyser=audioContext.createAnalyser();analyser.fftSize=256;source=audioContext.createMediaElementSource(audio);source.connect(analyser);analyser.connect(audioContext.destination);animate()}if(audioContext.state==='suspended')await audioContext.resume()}
function animate(){const data=new Uint8Array(analyser.frequencyBinCount);const draw=()=>{if(!audio.paused){analyser.getByteFrequencyData(data);bars.forEach((b,i)=>{const a=Math.floor(i*data.length/bars.length),z=Math.floor((i+1)*data.length/bars.length);let n=0;for(let j=a;j<z;j++)n+=data[j];const avg=n/Math.max(1,z-a),center=1-Math.abs(i-(bars.length-1)/2)/(bars.length/2);b.style.height=`${Math.max(4,4+avg/255*(44+18*center))}px`})}requestAnimationFrame(draw)};draw()}
async function start(){try{await setup();await audio.play();state(true)}catch(e){state(false)}}play.addEventListener('click',()=>audio.paused?start():(audio.pause(),state(false),reset()));previous.addEventListener('click',()=>load(index-1,!audio.paused));next.addEventListener('click',()=>load(index+1,!audio.paused));audio.addEventListener('loadedmetadata',()=>duration.textContent=format(audio.duration));audio.addEventListener('timeupdate',()=>{if(isSeeking||!audio.duration)return;const v=audio.currentTime/audio.duration*1000;progress.value=v;progress.style.setProperty('--value',`${v/10}%`);elapsed.textContent=format(audio.currentTime)});progress.addEventListener('input',()=>{isSeeking=true;progress.style.setProperty('--value',`${progress.value/10}%`);elapsed.textContent=format(audio.duration*progress.value/1000)});progress.addEventListener('change',()=>{if(audio.duration)audio.currentTime=audio.duration*progress.value/1000;isSeeking=false});audio.addEventListener('ended',()=>load(index+1,true));audio.addEventListener('play',()=>state(true));audio.addEventListener('pause',()=>{if(!audio.ended)state(false)});load(0);
</script></body></html>
