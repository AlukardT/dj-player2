<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Alex Blond Player</title>
<style>:root{color-scheme:dark;--a:#67c8ff;--bg:#020306}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);font-family:Arial,sans-serif}body{padding:8px}.player{width:100%;max-width:760px;min-height:160px;margin:auto;padding:17px 20px 12px;border:2px solid var(--a);border-radius:10px;background:linear-gradient(120deg,#0b1119,#030609);box-shadow:0 0 18px rgba(103,200,255,.22);overflow:hidden}.row{display:grid;grid-template-columns:170px minmax(0,1fr);align-items:center;gap:23px}.controls{display:flex;align-items:center;justify-content:center;gap:12px}.control{display:grid;place-items:center;padding:0;border:0;color:var(--a);background:transparent;cursor:pointer}.control svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}.side{width:35px;height:35px;opacity:.85}.main{width:64px;height:64px;border:1px solid #fff;border-radius:50%;background:rgba(8,15,23,.82);box-shadow:0 0 0 5px rgba(103,200,255,.08),0 5px 18px rgba(0,0,0,.4)}.main svg{width:29px;height:29px}.control:active{transform:scale(.93)}.info{min-width:0}.title{margin:0 0 5px;color:#fff;font-size:14px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.number{margin:0 0 13px;color:var(--a);font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}.progress{width:100%;height:4px;margin:0;appearance:none;border:0;border-radius:5px;outline:0;background:linear-gradient(to right,var(--a) 0%,var(--a) var(--value,0%),rgba(255,255,255,.18) var(--value,0%),rgba(255,255,255,.18) 100%);cursor:pointer}.progress::-webkit-slider-thumb{width:13px;height:13px;appearance:none;border:2px solid #fff;border-radius:50%;background:var(--a)}.progress::-moz-range-thumb{width:10px;height:10px;border:2px solid #fff;border-radius:50%;background:var(--a)}.time{display:flex;justify-content:space-between;margin-top:7px;color:rgba(255,255,255,.55);font-size:10px;font-variant-numeric:tabular-nums}.visualizer{height:32px;display:flex;align-items:flex-end;justify-content:center;gap:3px;margin-top:10px}.bar{width:4px;min-height:2px;border-radius:2px 2px 0 0;background:linear-gradient(to top,rgba(103,200,255,.12),var(--a));transition:height .06s linear}@media(max-width:520px){body{padding:5px}.player{min-height:145px;padding:14px 12px 9px;border-radius:7px}.row{grid-template-columns:125px minmax(0,1fr);gap:11px}.controls{gap:6px}.side{width:29px;height:29px}.main{width:55px;height:55px}.main svg{width:25px;height:25px}.title{font-size:12px}.number{margin-bottom:10px;font-size:8px}.visualizer{height:27px;margin-top:8px;gap:2px}.bar{width:3px}}</style></head>
<body><main class="player"><audio id="audio" preload="metadata" playsinline></audio><div class="row"><div class="controls"><button class="control side" id="previous" type="button" aria-label="Предыдущий трек"><svg viewBox="0 0 24 24"><path d="M15.5 5.5 7.5 12l8 6.5V5.5Z"/><path d="M6 5.5v13"/></svg></button><button class="control main" id="play" type="button" aria-label="Воспроизвести"><svg id="icon" viewBox="0 0 24 24"><path d="m9 6 9 6-9 6V6Z"/></svg></button><button class="control side" id="next" type="button" aria-label="Следующий трек"><svg viewBox="0 0 24 24"><path d="m8.5 5.5 8 6.5-8 6.5v-13Z"/><path d="M18 5.5v13"/></svg></button></div><div class="info"><p class="title" id="title"></p><p class="number" id="number"></p><input class="progress" id="progress" type="range" min="0" max="1000" value="0" aria-label="Позиция воспроизведения"><div class="time"><span id="elapsed">0:00</span><span id="duration">0:00</span></div></div></div><div class="visualizer" id="visualizer" aria-hidden="true"></div></main>
<script>const tracks=[{title:'DJ Alex Blond — Promo Mix',url:'./audio/mix-1.mp3'},{title:'Alex Blond — Warm Up Podcast #026',url:'./audio/mix-2.mp3'},{title:'ALEX BLOND — WELCOME Live Mix vol. 1',url:'./audio/mix-3.mp3'},{title:'ALEX BLOND — 2000 MINI MIX',url:'./audio/mix-4.mp3'},{title:'Alex Blond — Dance City Podcast #062 (Progressive)',url:'./audio/mix-5.mp3'}];
const audio=document.getElementById('audio'),play=document.getElementById('play'),icon=document.getElementById('icon'),previous=document.getElementById('previous'),next=document.getElementById('next'),title=document.getElementById('title'),number=document.getElementById('number'),progress=document.getElementById('progress'),elapsed=document.getElementById('elapsed'),duration=document.getElementById('duration'),visualizer=document.getElementById('visualizer');let index=0,ctx,analyser,source,seeking=false;const bars=[];for(let i=0;i<44;i++){const b=document.createElement('i');b.className='bar';b.style.height='2px';visualizer.appendChild(b);bars.push(b)}
const format=s=>{if(!Number.isFinite(s))return'0:00';const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=Math.floor(s%60).toString().padStart(2,'0');return h?`${h}:${m.toString().padStart(2,'0')}:${x}`:`${m}:${x}`};const state=p=>{play.setAttribute('aria-label',p?'Пауза':'Воспроизвести');icon.innerHTML=p?'<rect x="7" y="6" width="3.5" height="12" rx="1"></rect><rect x="13.5" y="6" width="3.5" height="12" rx="1"></rect>':'<path d="m9 6 9 6-9 6V6Z"></path>'};const reset=()=>bars.forEach(b=>b.style.height='2px');
function load(i,auto=false){index=(i+tracks.length)%tracks.length;audio.src=tracks[index].url;audio.load();title.textContent=tracks[index].title;number.textContent=`Трек ${index+1} из ${tracks.length}`;progress.value=0;progress.style.setProperty('--value','0%');elapsed.textContent=duration.textContent='0:00';state(false);reset();if(auto)audio.addEventListener('canplay',start,{once:true})}
async function setup(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();analyser=ctx.createAnalyser();analyser.fftSize=256;source=ctx.createMediaElementSource(audio);source.connect(analyser);analyser.connect(ctx.destination);animate()}if(ctx.state==='suspended')await ctx.resume()}
function animate(){const data=new Uint8Array(analyser.frequencyBinCount);const draw=()=>{if(!audio.paused){analyser.getByteFrequencyData(data);bars.forEach((b,i)=>{const a=Math.floor(i*data.length/bars.length),z=Math.floor((i+1)*data.length/bars.length);let n=0;for(let j=a;j<z;j++)n+=data[j];b.style.height=`${Math.max(2,2+n/Math.max(1,z-a)/255*26)}px`})}requestAnimationFrame(draw)};draw()}
async function start(){try{await setup();await audio.play();state(true)}catch(e){state(false)}}play.onclick=()=>audio.paused?start():(audio.pause(),state(false),reset());previous.onclick=()=>load(index-1,!audio.paused);next.onclick=()=>load(index+1,!audio.paused);audio.onloadedmetadata=()=>duration.textContent=format(audio.duration);audio.ontimeupdate=()=>{if(seeking||!audio.duration)return;const v=audio.currentTime/audio.duration*1000;progress.value=v;progress.style.setProperty('--value',`${v/10}%`);elapsed.textContent=format(audio.currentTime)};progress.oninput=()=>{seeking=true;progress.style.setProperty('--value',`${progress.value/10}%`);elapsed.textContent=format(audio.duration*progress.value/1000)};progress.onchange=()=>{if(audio.duration)audio.currentTime=audio.duration*progress.value/1000;seeking=false};audio.onended=()=>load(index+1,true);audio.onplay=()=>state(true);audio.onpause=()=>{if(!audio.ended)state(false)};load(0);</script></body></html>
